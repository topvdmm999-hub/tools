<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Live Price Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">PC Hardware Tracker</h1>
                <p id="last-update" class="text-slate-500 font-mono mt-2">Status: Waiting for bot...</p>
            </div>
        </div>
        <div id="display-area" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        async function loadPrices() {
            try {
                // ดึงข้อมูลจากไฟล์ data.json ที่บอทสร้างไว้
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                document.getElementById('last-update').innerText = "Last Update: " + data.updated;
                
                const container = document.getElementById('display-area');
                container.innerHTML = data.items.map(item => `
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl hover:border-yellow-500 transition-all shadow-xl">
                        <span class="${item.shop === 'ADVICE' ? 'bg-blue-600' : 'bg-red-600'} text-[10px] px-2 py-1 rounded-full font-bold">${item.shop}</span>
                        <h3 class="text-lg font-semibold my-3 h-14 overflow-hidden">${item.name}</h3>
                        <div class="text-2xl font-black text-yellow-400">${item.price} THB</div>
                    </div>
                `).join('');
            } catch (e) { console.log("รอข้อมูลจากบอท..."); }
        }
        setInterval(loadPrices, 5000); // เช็คข้อมูลใหม่ทุก 5 วินาที
        loadPrices();
    </script>
</body>
</html>
